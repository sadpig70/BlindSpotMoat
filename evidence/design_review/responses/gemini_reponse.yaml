    issue: "H3 assumes policy growth causes moat growth. This is correlational and historically naive. When an invisible track gains sufficient market share, policy apparatus expands to capture/regulate it, nullifying the moat. Counterexample: Open-source software entering critical infrastructure prompted the EU Cyber Resilience Act (CRA), forcing visibility and liability onto the 'invisible' FOSS track."
    suggested_fix: "Redefine the moat metric from static 'spot width' to 'Time-to-Capture' (estimating how long before policy instruments adapt to recognize the arbitrage)."
  - focus: 5
