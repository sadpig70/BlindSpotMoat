verdict: "revise"
focus_findings:
  - focus: 1
    severity: "critical"
    issue: "H1–H4 falsification conditions are weakly operationalized. 'Active OSS manufacturing assets' and 'payback weeks' rest on GitHub activity + self-reported BOM figures whose mapping to actual deployed, revenue-generating brownfield systems is unproven and easily confounded by hobbyist repos, abandoned forks, and selection bias in reported wins. 'Significantly large' set difference and 'significantly shorter' payback lack pre-specified effect sizes, statistical tests, or minimum viable sample definitions. H3 treats correlation between policy growth and blind-spot width as causal without identification strategy or lag structure."
    suggested_fix: "Pre-register explicit multi-signal definition of 'active asset' (GitHub + paid commercial references + integrator case studies + observable production metrics). Pre-specify statistical procedures, power calculations, and falsification thresholds for all four hypotheses before any data ingestion. Add H5: blind-spot deployments exhibit system-level reliability, maintainability, and scalability metrics non-inferior to matched policy-track deployments after controlling for size and application class."
  - focus: 2
    severity: "high"
    issue: "Pure set-difference O − (O ∩ P_visible) after EntityResolve systematically manufactures false blind spots. GitHub-centric O_set overweights low-stakes projects that are invisible because they are irrelevant or non-competitive rather than because of structural policy blindness. Entity resolution between informal OSS components and formal corporate entities listed in NZIA/IRA is brittle; many real overlaps (internal OSS use by visible firms) will be missed, inflating the measured gap. The method cannot distinguish 'unseen because policy is blind' from 'unseen because economically marginal'."
    suggested_fix: "Replace or heavily weight pure set-difference with deployment-evidence scoring. Require positive signals of commercial production use for inclusion in O_active. Add confidence tiers on entity resolution and mandatory sampled manual audit of top-ranked blind-spot assets before any scoring or ranking is emitted."
  - focus: 3
    severity: "critical"
    issue: "ReciprocalStandingLayer is conceptually incoherent. It claims to deliver enforceable reciprocal obligations and dispute-time standing while preserving the invisibility that constitutes the moat. Any contract or standing that can be asserted or proven in a dispute requires identification, verification, or trusted intermediaries — all of which create visibility surfaces or single points of failure that incumbents or regulators can target. Fail-closed aborts execution but does not resolve the underlying contradiction. This directly collides with the P7 observation that instruments unable to see the track also cannot protect it."
    suggested_fix: "Remove ReciprocalStandingLayer entirely from the core design. If any form of standing is desired, restrict it to cryptographically minimal, non-identity-leaking mechanisms (e.g., zero-knowledge contribution proofs) whose feasibility must be demonstrated before the node is re-introduced. Treat pure invisibility as the operating assumption rather than attempting to engineer around it."
  - focus: 4
    severity: "high"
    issue: "H3's claim that policy-apparatus growth self-reinforces the moat is asserted as causal but rests on unexamined directionality. Counterexample domains show the opposite dynamic: open-source infrastructure and cloud tooling were initially invisible to policy and procurement yet later became partially legible and sometimes actively supported once their economic weight was demonstrated (sovereign cloud mandates, government OSS procurement frameworks). In manufacturing, demonstrated success in the blind spot is more likely to trigger new safety, traceability, or certification rules that the invisible track is structurally less able to meet or influence."
    suggested_fix: "Reframe H3 as a pure correlation test with explicit lags and controls. Add an explicit policy-response model node that distinguishes adaptation (incorporation) from suppression (new barriers) and monitor for regime shifts. Do not treat moat self-reinforcement as the baseline expectation."
  - focus: 5
    severity: "high"
    issue: "Critical nodes are absent: (a) DataProvenance & Integrity (detects gaming of GitHub activity or curated lists), (b) LongitudinalTracker (measures whether previously blind assets remain blind after surfacing or over multi-year windows), (c) ComplianceSurface (maps regulatory exposure, certification gaps, and liability surfaces for top-ranked assets — especially material in brownfield manufacturing), and (d) no mechanism to track whether the audit engine's own outputs alter the phenomenon being measured."
    suggested_fix: "Insert DataProvenance & Integrity node early in the pipeline with anomaly detection for coordinated activity. Add LongitudinalTracker and ComplianceSurface as mandatory peers to MoatMetric. Add VisibilityErosionMonitor that tracks post-publication appearance of previously blind assets in policy documents, VC activity, or trade press."
  - focus: 6
    severity: "medium"
    issue: "D1-only scope freeze is strategically brittle for a mechanism whose source insight claims domain generality. Manufacturing retrofit carries uniquely high regulatory, safety, certification, and integrator-ecosystem barriers that may make the visibility moat either unusually durable or unusually fragile. Testing exclusively inside this domain prevents clean falsification of the core thesis and risks overfitting the engine to one sector's institutional peculiarities."
    suggested_fix: "Adopt staged scope: keep primary implementation and validation inside D1, but design the core mapping/scoring/hypothesis layers with an explicit abstraction boundary from the start. Run a lightweight parallel analysis on at least one non-manufacturing domain (D2) using the same engine to test mechanism portability before declaring scope freeze."
additions:
  - item: "VisibilityErosionMonitor node (mandatory)"
    rationale: "The audit engine and its monetization signals are themselves acts of surfacing. Without explicit tracking of whether previously invisible assets subsequently appear in policy lists, VC theses, or trade-press coverage, the project cannot test whether its own operation destroys the moat it claims to exploit."
  - item: "H5: Reliability & Scalability Hypothesis (mandatory)"
    rationale: "Short payback on sub-USD-100 SBC BOM is necessary but far from sufficient for brownfield manufacturing competitiveness. H5 is required to falsify the claim that blind-spot assets achieve non-inferior system-level uptime, mean-time-to-repair, and scalability characteristics once deployed at meaningful production volumes."
strongest_objection: "The project is structurally self-undermining. Its primary output — a ranked Track-Visibility Audit Engine that deliberately surfaces high-ROI blind-spot assets and emits monetization signals for long-retrofit/short-incumbent pairs — necessarily erodes or eliminates the invisibility that is asserted to be the moat. If the tool works, it makes the unseen track legible to the very actors (incumbents, policy instruments, and capital) whose blindness was the source of supposed advantage. Compounding this, the asserted 8–14 week payback advantage remains an unverified assertion resting on low-fidelity public proxies; if that performance gap is small, confounded, or non-persistent once measurement error and selection bias are removed, both the arbitrage thesis and the moat logic collapse simultaneously. The RECIP layer does not resolve but merely papers over the deeper contradiction between preserving invisibility and obtaining enforceable standing."
salvage_path: "Convert the project from a 'moat engine' into a pure, non-actionable diagnostic instrument. Remove all monetization signals, ReciprocalStandingLayer, and SurfacingOption. Pre-register complete data definitions, entity-resolution rules, statistical tests, and H1–H5 on an independent timestamped platform before ingesting any data. Add VisibilityErosionMonitor and ComplianceSurface as first-class nodes. Emit only descriptive reports with explicit methodological caveats and warnings that any publication may itself alter the measured blind spot. This yields a falsifiable policy-audit tool rather than a self-defeating competitive engine."